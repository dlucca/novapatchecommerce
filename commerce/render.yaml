services:
  # Medusa Backend
  - type: web
    name: novapatch-medusa-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 9000
      - key: DATABASE_URL
        fromDatabase:
          name: novapatch-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL_DEFAULT
        value: onboarding@resend.dev
      - key: RESEND_FROM_EMAIL_ORDERS
        value: onboarding@resend.dev
      - key: RESEND_FROM_EMAIL_WELCOME
        value: onboarding@resend.dev
      - key: RESEND_FROM_EMAIL_SUPPORT
        value: onboarding@resend.dev
      - key: RESEND_FROM_EMAIL_MARKETING
        value: onboarding@resend.dev

databases:
  - name: novapatch-postgres
    databaseName: novapatch_db
    user: novapatch_user
    plan: free